<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>{% block title %}TZ Databáze{% endblock %}</title>
        <style>
    /*CSS Variables for colors and fonts*/
    :root {
        --bg:           #0a0c0f;    /* dark background color for the whole page */
        --bg2:          #111418;    /* slightly lighter background color for containers */
        --bg3:          #181c22;    /* background of tables */
        --border:       #252c37;    /* border color */
        --orange:       #f97316;    /* orange color for highlights */
        --blue:         #38bdf8;    /* blue color for chips */
        --green:        #22c55e;    /* green color for hardness */
        --yellow:       #fbbf24;    /* yellow color for lenght of the process */
        --text:         #e8edf5;    /* main text color */
        --text2:        #8b949e;    /* secondary text color */
        --text3:        #4d5a6b;    /* tertiary text color */
        --font:         'Segoe UI'   , sans-serif; /* main font */
       }

       /* RESET - remove default margins and paddings */
       * { margin: 0; padding: 0; box-sizing: border-box; }
       html, body {height: 100%}

       body {
        background-color: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
        display: flex;              /*sidebar + content side by side*/
        min-height: 100vh;          /*full viewport height*/
    
       }

         /* SIDEBAR */
            .sidebar {
                width: 220px;
                min-height: 100vh;
                background-color: var(--bg2);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column; /*logo + navigation links in column*/
                flex-shrink: 0; /*prevent shrinking when content grows*/
            }

        /* LOGO */
            .logo {
                padding: 20px 16px;
                border-bottom: 1px solid var(--border);
                dispaly :flex;
                align-items: center;
                gap: 12px;
            }

            /*Logo ICON*/
                .logo-icon {
                    width: 40px;
                    height: 40px;
                    background-color: var(--orange);
                    border-radius: 8px;
                    display: flex;  
                    align-items: center
                    justify-content: center;
                    font-size: 18px;
                    /* Shineing effect */
                    box-shadow: 0 0 16px rgba(249, 115, 22, 0,35);
                    }

            /*Logo TEXT*/
                .logo-text {
                    font-size: 16px;
                    font-weight: 700;
                    line-height: 1.2;
                }

                .logo-sub  {
                    font-size: 12px;
                    color: var(--text3);
                    letter-spacing: 1 px;
                    text-transform: uppercase;

                }

            nav { padding: 12px 8px; flex: 1 ;}

            .nav-section {
                font-size: 10px;
                color: var (--text3);
                text-transform: uppercase;
                letter-spacing: 1.5px;
                padding: 8px 10px 4px;
                margin-top: 6px;
            }
            .nav-a {
                display: flex;
                align-items: center
                gap: 8px;
                padding: 8px 12px;
                border-radius: 7px;
                color: var (--text2);
                text-decoration: none;
                fontsize: 13px;
                margin-bottom: 2px;
                transition: all 0.15s; /* smooth hover effect */
                border: 1px solid transparent; /* for consistent size during hover */
            }
            .nav-a:hover {
                background-color: var(--bg3);
                color: var(--text);
            }
            .nav-a.active {
                background-color:rgba(249,115,22,0.12);
                color: var(--orange);
                border-color: rgba(249,115,22,0,2);
            }

            /* == MAIN CONTENT == */
            .main {
                flex 1;
                display: flex;
                flex-direction: column;
            }
            /* Upper HEADER */
            .topbar {
                height: 52px;
                background-color: var(--bg2);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                padding: 0 24px;
                gap: 12px;
                flex-shrink: 0;
            }
            .breadcrumb {
                font-size: 12px;
                color: var(--text3);
            }
            .breadcrumb span {
                color: var(--text2);
            }
            .topbar-action {
                margin-left: auto;
                display: flex;
                gap: 10px;
            }
            /* Content area */
            .content {
                flex: 1;
                padding: 24px;
                overflow-y: auto;
            }
            /* Buttons */
            .btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 8px 16px;
                border-radius: 7px;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                border: 1px solid;
                text-decoration: none;
                transition: all 0.15s;
                font-family: inherit;

            }
            .btn-primary {
                background-color: var(--orange);
                border-color: var(--orange);
                color: white;
                box-shadow: 0 0px 12px rgba(249, 115, 22, 0.25);
            }
            .btn {
                opacity: 0.85;
            }
            .btn-ghost {
                background-color: transparent;
                border-color: var(--border);
                color: var(--text2);
            }
            .btn-ghost:hover {
                background-color: var(--bg3);
                color: var(--text);
            }
            .btn-dager {
                background: rgba (248, 113 ,113, 0.1);
                border-color: rgba(248, 113, 113, 0.3);
                color: #f87171;
            }
            .btn-sm {
                padding: 5px 10px;
                font-size: 12px;
            }
            /* == Statistics cards 4 - cards in the top == */ 
            .stats {
                display: grid;;
            }
            .stat {
                background-color: var(--bg2);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 16px 18px;
                position: relative;
                overflow: hidden;
            }
            /* Colorful bar in the top of the card */
            .stat::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;

            }
            .stat-o::before {
                background-color: var(--orange);
            }
            .stat-b::before {
                background-color: var(--blue);
            }
            .stat-g::before {
                background-color: var(--green);
            }
            .stat-y::before {
                background-color: var(--yellow);
            }
            .stat-label {
                font-size: 10px;
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 6px;
            }
            .stat-val {
                font-size: 32px;
                font-weight: 700;
                line-height: 1;
            }
            .stat-o.stat-val { 
                color: var(--orange);
            }
            .stat-b.stat-val { 
                color: var(--blue);
            }
            .stat-g.stat-val { 
                color: var(--green);
            }
            .stat-y.stat-val { 
                color: var(--yellow);
            }
            .stat-sub {
                font-size: 11px;
                color: var(--text3);
                margin-top: 3px;
            }
            /* == Tables == */
            .table {
                background: var(--bg2);
                border: 1px solid var(--border);
                border-radius: 10px;
                overflow: hidden;
            }
            .slide-header {
                padding: 14px 18px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .slide-name {
                font-size: 15px;
                font-weight: 600;
            }
            .slide-count {
                font-size: 12px;
                color: var(--text3);
                margin-left: 8px;
            }
            .tab {
                width: 100%;
                border-collapse: collapse;
            }
            .thead th {
                padding: 9px 14px;
                text-align: left;
                font-size: 11px;
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 1px;
                background: var(--bg3);
                border-bottom: 1px solid var(--border);
            }
            .tbody tr {
                border-bottom: 1px solid var(--border);
                cursor: pointer;
                transition: background-color 0.1s;
            }
            .tbody tr: :last-child {
                border-bottom: none;
            }
            .tbody tr:hover {
                background-color: var(--bg3);
            }
            .tbody td {
                padding: 11px 14px;
                vertical-align: middle;
            }
            .td-name {
                font-weight: 500;
                color: var(--text);
            }
            .td-mono {
                font-family: monospace;
                font-size: 12px;
                color: var(--text2);
            }
            .td-temp {
                font-weight: 500;
                font-size: 15px;
                color: var(--orange);
            }
            .td-sub {
                font-size? 11px;
                color: var(--text3);
            }
            /* == Chips - štítky == */
            .chip {
                display: inline-flex;
                align-items: center;
                padding: 3px 9px;
                border-radius: 20px;
                font-size: 11px;
                font-weight: 500;
                border: 1px solid;
            }
            .chip-orange {
                background: rgba(247,115,22,0.12)
                color-var (--orange);
                border-color: rgba(247,115,22,0.25);
            }
            .chip-blue   { background:rgba(56,189,248,0.1);
                color:var(--blue); border-color:rgba(56,189,248,0.25); }
            .chip-green  { background:rgba(34,197,94,0.1);
                color:var(--green); border-color:rgba(34,197,94,0.25); }
            .chip-gray   { background:rgba(139,149,165,0.1);
                color:var(--gray); border-color: var(--border); }

            /* == Forms == */
            .form {
                max-width: 840px;
            }
            .form h1 {
                font-size: 24px;
                font-weight: 700;
                margin-bottom: 20px;
            }
            .form-section {
                backgroud:var(--bg2);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 20px 22px;
                margin-bottom: 14 px;
            }
            .form-section-tit {
                font-size: 10px;
                color:var(--text3);
                text-transform: uppercase;
                letter-spacing: 1.5px;
                margin-bottom: 14px;
                padding-bottom: 10px;
                border-bottom: 1px solid var(--border);
            }
            .from-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 13px;
            }
            .from-grid-3 {
                grid-template-columns: 1fr 1fr 1fr;
                display: grid;
                gap: 13px;
            }
            .label {
                display:flex;
                flex-direction: column;
                gap: 5px;
                font-size: 11px;
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.8px;

            }
            input [type=text], input [type=number], select, textarea { background:var (--bg3);
                border-radius: 7px ;
                border: 1px solid var(--border);
                padding: 9px 12px;
                color: var(--text);
                font-family: inherit;
                transition: border-color 0.15;
                width: 100%;
            }
            input:focus, select:focus, textarea:focus {
                border-color:var(--orange);
            }
            input::placeholder {
                color:var (--text3);
            }
            textarea {
                resize:vertical;
                min-height: 75px;
            }
            .form-akce {
                display: flex;
                gap: 10px;
                justify-content: flex-end;
                padding-top: 6px;

            }
            .chyba {
                background:rgba(248,113,113,0.1);
                border: 1 px solid rgba(248,13,113,0.3);
                border-radius: 7px;
                padding: 10px 16px;
                color: #f87171;
                font-size: 13px;
                margin-bottom: 14px;
            }

            /*== Empty Status ==*/
            .empty {
                text-align: center;
                padding: 50px 20px;

            }
            .empty-icon {
                font-size: 40px;
                margin-bottom: 10px;
                opacity: 0.35;
            }
