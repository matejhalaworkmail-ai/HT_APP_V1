<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TZ Databáze{% endblock %}</title>
    <style>
        /* ── CSS Variables ─────────────────────────────────────── */
        :root {
            --bg:       #0a0c0f;
            --bg2:      #111418;
            --bg3:      #181c22;
            --border:   #252c37;
            --orange:   #f97316;
            --blue:     #38bdf8;
            --green:    #22c55e;
            --yellow:   #fbbf24;
            --red:      #f87171;
            --text:     #e8edf5;
            --text2:    #8b949e;
            --text3:    #4d5a6b;
            --font:     'Segoe UI', sans-serif;
        }

        /* ── Reset ─────────────────────────────────────────────── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ───────────────────────────────────────────── */
        .sidebar {
            width: 220px;
            min-height: 100vh;
            background-color: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo {
            padding: 18px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background-color: var(--orange);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 0 16px rgba(249,115,22,0.35);
        }

        .logo-text {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
        }

        .logo-sub {
            font-size: 11px;
            color: var(--text3);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        nav { padding: 12px 8px; flex: 1; }

        .nav-section {
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 10px 4px;
            margin-top: 6px;
        }

        .nav-a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 7px;
            color: var(--text2);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 2px;
            transition: all 0.15s;
            border: 1px solid transparent;
        }

        .nav-a:hover {
            background-color: var(--bg3);
            color: var(--text);
        }

        .nav-a.active {
            background-color: rgba(249,115,22,0.12);
            color: var(--orange);
            border-color: rgba(249,115,22,0.25);
        }

        .nav-icon { font-size: 15px; }

        /* ── Main layout ───────────────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            height: 52px;
            background-color: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .breadcrumb {
            font-size: 12px;
            color: var(--text3);
        }
        .breadcrumb span { color: var(--text2); }
        .breadcrumb a { color: var(--text3); text-decoration: none; }
        .breadcrumb a:hover { color: var(--text2); }

        .topbar-action {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* ── Buttons ───────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            text-decoration: none;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--orange);
            border-color: var(--orange);
            color: white;
            box-shadow: 0 0 12px rgba(249,115,22,0.25);
        }
        .btn-primary:hover { background-color: #ea6c0a; }

        .btn-ghost {
            background-color: transparent;
            border-color: var(--border);
            color: var(--text2);
        }
        .btn-ghost:hover { background-color: var(--bg3); color: var(--text); }

        .btn-danger {
            background: rgba(248,113,113,0.1);
            border-color: rgba(248,113,113,0.3);
            color: var(--red);
        }
        .btn-danger:hover { background: rgba(248,113,113,0.2); }

        .btn-sm { padding: 5px 10px; font-size: 12px; }

        /* ── Stats cards ───────────────────────────────────────── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 22px;
        }

        .stat {
            background-color: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 18px;
            position: relative;
            overflow: hidden;
        }
        .stat::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }
        .stat-o::before { background-color: var(--orange); }
        .stat-b::before { background-color: var(--blue); }
        .stat-g::before { background-color: var(--green); }
        .stat-y::before { background-color: var(--yellow); }

        .stat-label {
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .stat-val {
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
        }
        .stat-o .stat-val { color: var(--orange); }
        .stat-b .stat-val { color: var(--blue); }
        .stat-g .stat-val { color: var(--green); }
        .stat-y .stat-val { color: var(--yellow); }
        .stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

        /* ── Table panel ───────────────────────────────────────── */
        .table-panel {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 600;
        }
        .panel-count {
            font-size: 12px;
            color: var(--text3);
            margin-left: 8px;
        }

        /* Search bar */
        .search-form { display: flex; gap: 8px; }
        .search-input {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 7px 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            width: 240px;
            transition: border-color 0.15s;
        }
        .search-input:focus { outline: none; border-color: var(--orange); }
        .search-input::placeholder { color: var(--text3); }

        /* ── Data table ────────────────────────────────────────── */
        .tab { width: 100%; border-collapse: collapse; }

        .tab thead th {
            padding: 9px 14px;
            text-align: left;
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
        }

        .tab tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background-color 0.1s;
        }
        .tab tbody tr:last-child { border-bottom: none; }
        .tab tbody tr:hover { background-color: var(--bg3); }

        .tab tbody td {
            padding: 11px 14px;
            vertical-align: middle;
        }

        .td-name { font-weight: 500; color: var(--text); }
        .td-mono { font-family: monospace; font-size: 12px; color: var(--text2); }
        .td-orange { font-weight: 500; color: var(--orange); }
        .td-sub { font-size: 11px; color: var(--text3); }
        .td-actions { display: flex; gap: 6px; }

        /* ── Chips ─────────────────────────────────────────────── */
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid;
        }
        .chip-orange { background: rgba(249,115,22,0.12); color: var(--orange); border-color: rgba(249,115,22,0.25); }
        .chip-blue   { background: rgba(56,189,248,0.1);  color: var(--blue);   border-color: rgba(56,189,248,0.25); }
        .chip-green  { background: rgba(34,197,94,0.1);   color: var(--green);  border-color: rgba(34,197,94,0.25); }
        .chip-gray   { background: rgba(139,149,165,0.1); color: var(--text2);  border-color: var(--border); }

        /* ── Forms ─────────────────────────────────────────────── */
        .form-wrap { max-width: 900px; }

        .form-section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 22px;
            margin-bottom: 16px;
        }

        .form-section-title {
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .form-grid   { display: grid; grid-template-columns: 1fr 1fr;     gap: 14px; }
        .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .form-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; }
        .col-span-2  { grid-column: span 2; }
        .col-span-3  { grid-column: span 3; }

        .label {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input[type=text], input[type=number], input[type=email], select, textarea {
            background: var(--bg3);
            border-radius: 7px;
            border: 1px solid var(--border);
            padding: 9px 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.15s;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--orange);
        }
        input::placeholder { color: var(--text3); }
        textarea { resize: vertical; min-height: 75px; }

        select option { background: var(--bg3); }

        /* File input */
        input[type=file] {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 7px 10px;
            color: var(--text2);
            font-size: 12px;
            width: 100%;
            cursor: pointer;
        }
        input[type=file]:hover { border-color: var(--orange); }

        /* Autocomplete dropdown */
        .autocomplete-wrap { position: relative; }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg3);
            border: 1px solid var(--orange);
            border-top: none;
            border-radius: 0 0 7px 7px;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .autocomplete-item {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.1s;
        }
        .autocomplete-item:hover { background: rgba(249,115,22,0.1); color: var(--orange); }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding-top: 6px;
        }

        /* ── Error / alert ─────────────────────────────────────── */
        .alert-error {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 7px;
            padding: 10px 16px;
            color: var(--red);
            font-size: 13px;
            margin-bottom: 16px;
        }

        /* ── Empty state ───────────────────────────────────────── */
        .empty {
            text-align: center;
            padding: 50px 20px;
        }
        .empty-icon {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.35;
        }
        .empty-text { color: var(--text3); font-size: 14px; }

        /* ── Detail view ───────────────────────────────────────── */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .detail-section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px 20px;
        }
        .detail-section.full { grid-column: span 2; }

        .detail-section-title {
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-key {
            font-size: 12px;
            color: var(--text3);
            flex-shrink: 0;
        }
        .detail-val {
            font-size: 13px;
            color: var(--text);
            text-align: right;
        }

        .chem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        .chem-item {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
        }
        .chem-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
        .chem-val { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 2px; }

        /* ── Page title ────────────────────────────────────────── */
        .page-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* ── File link ─────────────────────────────────────────── */
        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--blue);
            text-decoration: none;
            font-size: 13px;
        }
        .file-link:hover { text-decoration: underline; }

        /* ── Checkbox ──────────────────────────────────────────── */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text2);
            cursor: pointer;
        }
        input[type=checkbox] {
            width: 16px;
            height: 16px;
            accent-color: var(--orange);
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">
        <div class="logo-icon">🔥</div>
        <div>
            <div class="logo-text">TZ Databáze</div>
            <div class="logo-sub">Heat Treatment</div>
        </div>
    </div>
    <nav>
        <div class="nav-section">Hlavní</div>
        <a href="{{ url_for('Parts') }}" class="nav-a {% if request.endpoint == 'Parts' or request.endpoint == 'parts_detail' or request.endpoint == 'parts_form' %}active{% endif %}">
            <span class="nav-icon">⚙️</span> Díly
        </a>

        <div class="nav-section">Konfigurace</div>
        <a href="{{ url_for('materials') }}" class="nav-a {% if 'material' in (request.endpoint or '') %}active{% endif %}">
            <span class="nav-icon">🧱</span> Materiály
        </a>
        <a href="{{ url_for('machines') }}" class="nav-a {% if 'machine' in (request.endpoint or '') %}active{% endif %}">
            <span class="nav-icon">🏭</span> Zařízení
        </a>
    </nav>
</aside>

<!-- MAIN -->
<div class="main">
    <div class="topbar">
        <div class="breadcrumb">{% block breadcrumb %}{% endblock %}</div>
        <div class="topbar-action">{% block topbar_actions %}{% endblock %}</div>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
