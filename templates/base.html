<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TZ Databáze{% endblock %}</title>
    <style>
        /* ── Variables ─────────────────────────────────────────── */
        :root {
            --bg:       #080a0d;
            --bg2:      #0d1117;
            --bg3:      #161b22;
            --bg4:      #1c2230;
            --border:   #21262d;
            --border2:  #30363d;
            --accent:   #e8750a;
            --accent-h: #f08030;
            --accent-glow: rgba(232,117,10,0.18);
            --blue:     #58a6ff;
            --green:    #3fb950;
            --yellow:   #d29922;
            --red:      #f85149;
            --purple:   #bc8cff;
            --text:     #c9d1d9;
            --text2:    #8b949e;
            --text3:    #484f58;
            --font:     -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
            --radius:   6px;
            --radius-lg: 10px;
            --shadow:   0 1px 3px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.3);
        }

        /* ── Reset ─────────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            line-height: 1.5;
            display: flex;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sidebar ───────────────────────────────────────────── */
        .sidebar {
            width: 230px;
            min-height: 100vh;
            background: linear-gradient(180deg, #0d1117 0%, #080a0d 100%);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 20px 16px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #c06008);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .logo-text {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.2px;
        }

        .logo-sub {
            font-size: 10px;
            color: var(--text3);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        nav { padding: 10px 8px; flex: 1; }

        .nav-section {
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.8px;
            padding: 10px 10px 4px;
            font-weight: 600;
        }

        .nav-a {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px 10px;
            border-radius: var(--radius);
            color: var(--text2);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 1px;
            transition: background 0.12s, color 0.12s;
            border: 1px solid transparent;
            font-weight: 450;
        }

        .nav-a:hover {
            background: var(--bg3);
            color: var(--text);
        }

        .nav-a.active {
            background: rgba(232,117,10,0.1);
            color: var(--accent-h);
            border-color: rgba(232,117,10,0.2);
            font-weight: 500;
        }

        .nav-icon {
            width: 18px;
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text3);
        }

        /* ── Main ──────────────────────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg);
        }

        .topbar {
            height: 50px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .breadcrumb span { color: var(--text2); }
        .breadcrumb a { color: var(--text3); text-decoration: none; transition: color 0.12s; }
        .breadcrumb a:hover { color: var(--text2); }
        .breadcrumb-sep { color: var(--text3); opacity: 0.5; }

        .topbar-action {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .content {
            flex: 1;
            padding: 28px 28px;
            overflow-y: auto;
        }

        /* ── Buttons ───────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 15px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            text-decoration: none;
            transition: all 0.12s;
            font-family: inherit;
            white-space: nowrap;
            line-height: 1.4;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 1px 4px rgba(232,117,10,0.3);
        }
        .btn-primary:hover {
            background: var(--accent-h);
            border-color: var(--accent-h);
            box-shadow: 0 2px 8px rgba(232,117,10,0.4);
        }

        .btn-secondary {
            background: var(--bg3);
            border-color: var(--border2);
            color: var(--text);
        }
        .btn-secondary:hover { background: var(--bg4); border-color: var(--text3); }

        .btn-ghost {
            background: transparent;
            border-color: var(--border2);
            color: var(--text2);
        }
        .btn-ghost:hover { background: var(--bg3); color: var(--text); }

        .btn-danger {
            background: rgba(248,81,73,0.08);
            border-color: rgba(248,81,73,0.25);
            color: var(--red);
        }
        .btn-danger:hover { background: rgba(248,81,73,0.16); }

        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .btn-xs { padding: 3px 8px; font-size: 11px; }

        /* ── Stat cards ────────────────────────────────────────── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.15s;
        }
        .stat:hover { border-color: var(--border2); }

        .stat::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        .stat-o::after { background: var(--accent); }
        .stat-b::after { background: var(--blue); }
        .stat-g::after { background: var(--green); }
        .stat-y::after { background: var(--yellow); }

        .stat-label {
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .stat-val {
            font-size: 30px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -1px;
        }
        .stat-o .stat-val { color: var(--accent); }
        .stat-b .stat-val { color: var(--blue); }
        .stat-g .stat-val { color: var(--green); }
        .stat-y .stat-val { color: var(--yellow); }
        .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

        /* ── Table panel ───────────────────────────────────────── */
        .table-panel {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            background: var(--bg2);
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .panel-count {
            font-size: 12px;
            color: var(--text3);
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2px 10px;
            margin-left: 8px;
        }

        /* Search */
        .search-form { display: flex; gap: 8px; align-items: center; }
        .search-input {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            width: 240px;
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .search-input::placeholder { color: var(--text3); }

        /* ── Table ─────────────────────────────────────────────── */
        .tab { width: 100%; border-collapse: collapse; }

        .tab thead th {
            padding: 9px 16px;
            text-align: left;
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .tab tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.08s;
        }
        .tab tbody tr:last-child { border-bottom: none; }
        .tab tbody tr:hover { background: rgba(255,255,255,0.02); }

        .tab tbody td {
            padding: 11px 16px;
            vertical-align: middle;
        }

        .td-name { font-weight: 500; color: var(--text); }
        .td-mono { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; color: var(--text2); }
        .td-accent { font-weight: 600; color: var(--accent); }
        .td-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
        .td-actions { display: flex; gap: 6px; }

        /* ── Chips / badges ────────────────────────────────────── */
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid;
            white-space: nowrap;
        }
        .chip-orange { background: rgba(232,117,10,0.1); color: var(--accent-h); border-color: rgba(232,117,10,0.2); }
        .chip-blue   { background: rgba(88,166,255,0.1); color: var(--blue);     border-color: rgba(88,166,255,0.2); }
        .chip-green  { background: rgba(63,185,80,0.1);  color: var(--green);    border-color: rgba(63,185,80,0.2); }
        .chip-gray   { background: var(--bg3);           color: var(--text2);    border-color: var(--border); }
        .chip-red    { background: rgba(248,81,73,0.1);  color: var(--red);      border-color: rgba(248,81,73,0.2); }

        /* ── Forms ─────────────────────────────────────────────── */
        .form-wrap { max-width: 920px; }

        .form-section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 14px;
            transition: border-color 0.15s;
        }
        .form-section:focus-within { border-color: var(--border2); }

        .form-section-title {
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .form-grid   { display: grid; grid-template-columns: 1fr 1fr;         gap: 14px; }
        .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr;     gap: 14px; }
        .form-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; }
        .col-span-2  { grid-column: span 2; }
        .col-span-3  { grid-column: span 3; }
        .col-span-4  { grid-column: span 4; }

        .label {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.9px;
            font-weight: 600;
        }

        input[type=text], input[type=number], input[type=email], select, textarea {
            background: var(--bg3);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 8px 11px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.12s, box-shadow 0.12s;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        input::placeholder { color: var(--text3); }
        textarea { resize: vertical; min-height: 76px; line-height: 1.5; }
        select option { background: var(--bg3); }

        /* File input */
        input[type=file] {
            background: var(--bg3);
            border: 1px dashed var(--border2);
            border-radius: var(--radius);
            padding: 10px 12px;
            color: var(--text2);
            font-size: 12px;
            width: 100%;
            cursor: pointer;
            transition: border-color 0.12s;
        }
        input[type=file]:hover { border-color: var(--accent); }

        /* Autocomplete */
        .autocomplete-wrap { position: relative; }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg3);
            border: 1px solid var(--accent);
            border-top: none;
            border-radius: 0 0 var(--radius) var(--radius);
            z-index: 200;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            box-shadow: var(--shadow);
        }
        .autocomplete-item {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.1s;
            color: var(--text2);
        }
        .autocomplete-item:hover { background: rgba(232,117,10,0.1); color: var(--text); }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding-top: 4px;
            margin-top: 6px;
        }

        /* Multi-check grid */
        .multicheck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }

        /* ── Error / alerts ────────────────────────────────────── */
        .alert-error {
            background: rgba(248,81,73,0.08);
            border: 1px solid rgba(248,81,73,0.25);
            border-radius: var(--radius);
            padding: 10px 16px;
            color: var(--red);
            font-size: 13px;
            margin-bottom: 16px;
        }

        /* ── Empty state ───────────────────────────────────────── */
        .empty {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.2; }
        .empty-text { color: var(--text3); font-size: 14px; }

        /* ── Detail view ───────────────────────────────────────── */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .detail-section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
        }
        .detail-section.full { grid-column: span 2; }

        .detail-section-title {
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-key { font-size: 12px; color: var(--text3); flex-shrink: 0; }
        .detail-val { font-size: 13px; color: var(--text); text-align: right; }

        .chem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .chem-item {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 10px;
        }
        .chem-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
        .chem-val { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 2px; }

        /* ── Page title ────────────────────────────────────────── */
        .page-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        /* ── File items ────────────────────────────────────────── */
        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--blue);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.1s;
        }
        .file-link:hover { color: #79b9ff; text-decoration: underline; }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 6px;
        }

        /* ── Checkbox ──────────────────────────────────────────── */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text2);
            cursor: pointer;
            padding: 7px 10px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg3);
            transition: border-color 0.12s, background 0.12s;
        }
        .checkbox-label:hover { border-color: var(--border2); background: var(--bg4); color: var(--text); }
        input[type=checkbox] {
            width: 15px;
            height: 15px;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        /* ── Divider ───────────────────────────────────────────── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        /* ── Scrollbar ─────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">
        <div class="logo-icon">🔥</div>
        <div>
            <div class="logo-text">TZ Databáze</div>
            <div class="logo-sub">Heat Treatment</div>
        </div>
    </div>
    <nav>
        <div class="nav-section">Databáze</div>
        <a href="{{ url_for('Parts') }}" class="nav-a {% if request.endpoint == 'Parts' or request.endpoint == 'parts_detail' or request.endpoint == 'parts_form' %}active{% endif %}">
            <span class="nav-icon">⚙</span> Díly
        </a>

        <div class="nav-section">Konfigurace</div>
        <a href="{{ url_for('materials') }}" class="nav-a {% if 'material' in (request.endpoint or '') %}active{% endif %}">
            <span class="nav-icon">◈</span> Materiály
        </a>
        <a href="{{ url_for('machines') }}" class="nav-a {% if 'machine' in (request.endpoint or '') %}active{% endif %}">
            <span class="nav-icon">▣</span> Zařízení
        </a>
    </nav>
    <div class="sidebar-footer">
        v2.0 · SQLite
    </div>
</aside>

<!-- MAIN -->
<div class="main">
    <div class="topbar">
        <div class="breadcrumb">{% block breadcrumb %}{% endblock %}</div>
        <div class="topbar-action">{% block topbar_actions %}{% endblock %}</div>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
